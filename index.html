<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DUMA Support</title>
  <style>
    :root {
      color-scheme: dark;
      --bg1: #0b1730;
      --bg2: #14395d;
      --card: rgba(255,255,255,0.08);
      --line: rgba(255,255,255,0.14);
      --text: #f3f7ff;
      --muted: rgba(243,247,255,0.78);
      --accent: #43d3be;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, rgba(67,211,190,0.24), transparent 35%), linear-gradient(160deg, var(--bg2), var(--bg1));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.28);
    }
    h1 { margin: 0 0 8px; font-size: clamp(32px, 5vw, 52px); }
    p { color: var(--muted); line-height: 1.6; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    a {
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 600;
    }
    a:hover { border-color: var(--accent); }
    .small { margin-top: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>DUMA</h1>
    <p>DUMA is a mobile word game. This page hosts the public support files used for Google Play and Google AdMob verification.</p>
    <div class="links">
      <a href="/privacy-policy.html">Privacy Policy</a>
      <a href="/app-ads.txt">app-ads.txt</a>
      <a href="mailto:lvisoiu300@gmail.com">Contact</a>
    </div>
    <p class="small">Developer contact: lvisoiu300@gmail.com</p>
  </main>
</body>
</html>
